name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend install
        run: npm ci
        working-directory: frontend

      - name: Frontend lint
        run: npm run lint
        working-directory: frontend

      - name: Frontend build
        run: npm run build
        working-directory: frontend

      - name: Backend test
        run: |
          if [ -f ./gradlew ]; then
            chmod +x ./gradlew
            ./gradlew test
          elif [ -f ./backend/gradlew ]; then
            chmod +x ./backend/gradlew
            cd backend
            ./gradlew test
          else
            echo "Backend Gradle project not found. Skipping backend tests."
          fi
